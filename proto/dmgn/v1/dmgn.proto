syntax = "proto3";
package dmgn.v1;
option go_package = "github.com/nnlgsakib/dmgn/proto/dmgnpb";

// Memory is the core data structure (wire format for network transmission).
message Memory {
  string id = 1;
  int64 timestamp = 2;
  string type = 3;
  repeated float embedding = 4 [packed = true];
  bytes encrypted_payload = 5;
  repeated string links = 6;
  string merkle_proof = 7;
  map<string, string> metadata = 8;
}

// StoreRequest is the protobuf header sent before shard data on a store stream.
message StoreRequest {
  string memory_id = 1;
  int32 shard_index = 2;
  int32 total_shards = 3;
  int32 threshold = 4;
  string checksum = 5;
  int32 data_len = 6;
}

// StoreResponse is the protobuf response after a store operation.
message StoreResponse {
  string status = 1;
  string message = 2;
}

// FetchRequest is the protobuf header for a fetch stream.
message FetchRequest {
  string memory_id = 1;
  int32 shard_index = 2;
}

// FetchResponse is the protobuf response for a fetch operation.
message FetchResponse {
  string status = 1;
  string memory_id = 2;
  int32 shard_index = 3;
  int32 total_shards = 4;
  int32 threshold = 5;
  string checksum = 6;
  int32 data_len = 7;
  string message = 8;
}

// GossipMessage is the envelope for gossip broadcasts.
message GossipMessage {
  string type = 1;
  bytes memory = 2;
  string sender_peer_id = 3;
  int64 timestamp = 4;
  uint64 sequence = 5;
}

// SyncRequest is sent by the initiator to begin delta sync.
message SyncRequest {
  string sender_peer_id = 1;
  map<string, uint64> version_vector = 2;
}

// SyncResponse is sent by the responder with missing memories and their version vector.
message SyncResponse {
  string sender_peer_id = 1;
  map<string, uint64> version_vector = 2;
  repeated bytes memories = 3;
}

// QueryFilters holds optional query filters.
message QueryFilters {
  string type = 1;
  int64 after = 2;
  int64 before = 3;
}

// QueryRequest is the wire format for cross-peer queries.
message QueryRequest {
  string query_id = 1;
  repeated float embedding = 2 [packed = true];
  string text_query = 3;
  int32 limit = 4;
  QueryFilters filters = 5;
}

// QueryResult holds a single search result.
message QueryResult {
  string memory_id = 1;
  double score = 2;
  string type = 3;
  int64 timestamp = 4;
  string snippet = 5;
  string source_peer = 6;
}

// QueryResponse is the wire format for cross-peer query results.
message QueryResponse {
  string query_id = 1;
  repeated QueryResult results = 2;
  int32 total_searched = 3;
}
