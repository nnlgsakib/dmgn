name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
      draft:
        description: 'Create as draft'
        type: boolean
        default: false

env:
  GO_VERSION: '1.25'
  CGO_ENABLED: 0

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate tag format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Tag must be in format vMAJOR.MINOR.PATCH (e.g., v1.0.0)"
            exit 1
          fi

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dmgn-linux-amd64 ./cmd/dmgn
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dmgn-darwin-amd64 ./cmd/dmgn
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dmgn-windows-amd64.exe ./cmd/dmgn

      - name: Generate checksums
        run: |
          shasum -a 256 dmgn-linux-amd64 dmgn-darwin-amd64 dmgn-windows-amd64.exe | tee checksums.txt

      - name: Create Release with SoftProps
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: DMGN ${{ steps.version.outputs.version }}
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          body: |
            ## Installation

            Download the appropriate binary for your platform:

            ### Linux
            ```bash
            curl -sL https://github.com/nnlgsakib/dmgn/releases/download/${{ steps.version.outputs.version }}/dmgn-linux-amd64 -o dmgn
            chmod +x dmgn
            ```

            ### macOS
            ```bash
            curl -sL https://github.com/nnlgsakib/dmgn/releases/download/${{ steps.version.outputs.version }}/dmgn-darwin-amd64 -o dmgn
            chmod +x dmgn
            ```

            ### Windows
            Download `dmgn-windows-amd64.exe` from the assets below.

            ## Docker

            ```bash
            docker pull ghcr.io/nnlgsakib/dmgn:${{ steps.version.outputs.version }}
            ```
          files: |
            dmgn-linux-amd64
            dmgn-darwin-amd64
            dmgn-windows-amd64.exe
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/nnlgsakib/dmgn:${{ needs.release.outputs.version }}
            ghcr.io/nnlgsakib/dmgn:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [release, docker]
    if: always()
    steps:
      - name: Success notification
        if: needs.release.result == 'success'
        run: echo "Release completed successfully!"

      - name: Failure notification
        if: needs.release.result == 'failure'
        run: echo "Release failed!"
